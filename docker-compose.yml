version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile_app
    mem_limit: 510m
    environment:
      APP_PORT: "5000"
    ports:
      - "127.0.0.1:${WEB_PUBLIC_PORT:-8080}:5000"

  tester:
    build:
      context: .
      dockerfile: Dockerfile_tester
    mem_limit: 510m
    depends_on:
      - app
    environment:
      APP_BASE_URL: "${APP_BASE_URL:-http://app:5000}"
      FORBIDDEN_VARIABLE_NAME: "${FORBIDDEN_VARIABLE_NAME:-ivan}"
    ports:
      - "127.0.0.1:${TESTER_SSH_PUBLIC_PORT:-2222}:22"
